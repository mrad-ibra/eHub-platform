services:
  postgres:
    image: postgres:16-alpine
    container_name: ehub-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ehub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ehub}
      POSTGRES_DB: ${POSTGRES_DB:-ehub}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ehub_postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ehub} -d ${POSTGRES_DB:-ehub}"]
      interval: 5s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: ehub-pgadmin-dev
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@ehub.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - ehub_pgadmin_data_dev:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: ehub-redis-dev
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - ehub_redis_data_dev:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ehub-api-dev
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB:-ehub};Username=${POSTGRES_USER:-ehub};Password=${POSTGRES_PASSWORD:-ehub}
      ConnectionStrings__Redis: redis:6379
      Auth__Jwt__Key: ${JWT_KEY:-ehub-dev-only-symmetric-key-change-in-prod-32chars}
      Auth__Seed__Enabled: "true"
      Auth__Seed__Email: ${SEED_EMAIL:-admin@ehub.local}
      Auth__Seed__Password: ${SEED_PASSWORD:-ChangeMe123!}
      Jobs__ExpirePendingBookings__Enabled: "true"
      Jobs__ExpirePendingBookings__IntervalSeconds: "60"
    ports:
      - "${API_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  ehub_postgres_data_dev:
  ehub_pgadmin_data_dev:
  ehub_redis_data_dev:
