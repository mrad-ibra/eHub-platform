name: Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DOTNET_NOLOGO: true
      EHUB_REQUIRE_POSTGRES_TESTS: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Unit tests
        run: dotnet test tests/eHub.UnitTests/eHub.UnitTests.csproj --no-build -c Release --verbosity minimal

      - name: Integration tests (PostgreSQL required)
        run: dotnet test tests/eHub.IntegrationTests/eHub.IntegrationTests.csproj --no-build -c Release --verbosity minimal

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script_stop: true
          envs: DEPLOY_PATH
          script: |
            set -euo pipefail
            ROOT="${DEPLOY_PATH:-/opt/eHub-platform}"
            cd "$ROOT"
            git fetch origin
            git reset --hard "origin/${GITHUB_REF_NAME}"
            chmod +x scripts/deploy/remote-deploy.sh
            EHUB_ROOT="$ROOT" EHUB_DEPLOY_BRANCH="${GITHUB_REF_NAME}" EHUB_SKIP_GIT_PULL=1 \
              bash scripts/deploy/remote-deploy.sh
